// ==================================================
// AUTOEXEC CFG
// ==================================================
// Personal CS2 config
// Loads binds, crosshair toggles, movement, radar,
// voice, sensitivity, and utility binds.
// ==================================================

// Set temporary generic console output color to green.
log_color "Console" "7AFF8EFF"

// ==================================================
// CROSSHAIR COLOR TOGGLE
// [ = cyan -> green -> black -> repeat
// ==================================================

bind "[" "cycle_xhair_color"

alias "xhair_cyan"  "cl_crosshaircolor 5; cl_crosshaircolor_r 0; cl_crosshaircolor_g 255; cl_crosshaircolor_b 255; alias cycle_xhair_color xhair_green"
alias "xhair_green" "cl_crosshaircolor 5; cl_crosshaircolor_r 0; cl_crosshaircolor_g 255; cl_crosshaircolor_b 0; alias cycle_xhair_color xhair_black"
alias "xhair_black" "cl_crosshaircolor 5; cl_crosshaircolor_r 0; cl_crosshaircolor_g 0; cl_crosshaircolor_b 0; alias cycle_xhair_color xhair_cyan"

alias "cycle_xhair_color" "xhair_cyan"

// Default color
xhair_black

// ==================================================
// CROSSHAIR TOGGLE
// ] = primary -> dot -> alt -> extra -> repeat
// ==================================================

bind "]" "toggle_crosshair"

alias "xhair_shared" "cl_crosshairalpha 255; cl_crosshairusealpha 1; cl_crosshairstyle 4; cl_crosshair_t 0; cl_crosshair_recoil 0; cl_fixedcrosshairgap 3; cl_crosshairgap_useweaponvalue 0; cl_crosshair_dynamic_splitdist 0; cl_crosshair_dynamic_splitalpha_innermod 0; cl_crosshair_dynamic_splitalpha_outermod 1; cl_crosshair_dynamic_maxdist_splitratio 0.5"

// PRIMARY - new main
alias "crosshair_primary_apply" "cl_crosshair_drawoutline 0; cl_crosshair_outlinethickness 0; cl_crosshairdot 0; cl_crosshairgap -2.8; cl_crosshairsize 1.3; cl_crosshairthickness 0.4"
alias "crosshair_primary" "xhair_shared; crosshair_primary_apply; alias toggle_crosshair crosshair_dot; echo Primary"

// DOT
alias "crosshair_dot_apply" "cl_crosshair_drawoutline 0; cl_crosshair_outlinethickness 0; cl_crosshairgap -5; cl_crosshairthickness 0.5; cl_crosshairdot 1; cl_crosshairsize 0.6"
alias "crosshair_dot" "xhair_shared; crosshair_dot_apply; alias toggle_crosshair crosshair_alt; echo Dot"

// ALT - old primary
alias "crosshair_alt_apply" "cl_crosshair_drawoutline 1; cl_crosshair_outlinethickness 0; cl_crosshairdot 0; cl_crosshairgap -2.9; cl_crosshairsize 1.8; cl_crosshairthickness 0.8"
alias "crosshair_alt" "xhair_shared; crosshair_alt_apply; alias toggle_crosshair crosshair_alt2; echo Old Primary"

// ALT 2 - current main
alias "crosshair_alt2_apply" "cl_crosshair_drawoutline 0; cl_crosshair_outlinethickness 0; cl_crosshairdot 0; cl_crosshairgap -3.2; cl_crosshairsize 1.3; cl_crosshairthickness 0.6"
alias "crosshair_alt2" "xhair_shared; crosshair_alt2_apply; alias toggle_crosshair crosshair_extra; echo Alt 2"

// EXTRA
alias "crosshair_extra_apply" "cl_crosshair_drawoutline 0; cl_crosshair_outlinethickness 0; cl_crosshairgap -5; cl_crosshairthickness 0.3; cl_crosshairdot 0; cl_crosshairsize 1.7"
alias "crosshair_extra" "xhair_shared; crosshair_extra_apply; alias toggle_crosshair crosshair_primary; echo Extra"

// Default state
alias "toggle_crosshair" "crosshair_dot"
//crosshair_primary
crosshair_alt2

// ==================================================
// VIEWMODEL TOGGLE
// ' = Viewmodel 4 -> Viewmodel 3 -> Viewmodel 1 -> Viewmodel 2 -> repeat
// ==================================================

bind "'" "toggle_viewmodel"

// --------------------------
// VIEWMODEL 1
// --------------------------
alias "viewmodel_1" "viewmodel_fov 68; viewmodel_presetpos 0; viewmodel_offset_x 2.5; viewmodel_offset_y -0.80; viewmodel_offset_z -1.10; alias toggle_viewmodel viewmodel_2; echo Viewmodel 1"

// --------------------------
// VIEWMODEL 2
// --------------------------
alias "viewmodel_2" "viewmodel_fov 68; viewmodel_presetpos 0; viewmodel_offset_x 2.5; viewmodel_offset_y 2.0; viewmodel_offset_z -1.10; alias toggle_viewmodel viewmodel_4; echo Viewmodel 2"

// --------------------------
// VIEWMODEL 3
// --------------------------
alias "viewmodel_3" "viewmodel_fov 68; viewmodel_presetpos 0; viewmodel_offset_x 2.5; viewmodel_offset_y 1.0; viewmodel_offset_z -1.10; alias toggle_viewmodel viewmodel_1; echo Viewmodel 3"

// --------------------------
// VIEWMODEL 4
// --------------------------
alias "viewmodel_4" "viewmodel_fov 68; viewmodel_presetpos 0; viewmodel_offset_x 2.5; viewmodel_offset_y 0.25; viewmodel_offset_z -1.35; alias toggle_viewmodel viewmodel_3; echo Viewmodel 4"

// --------------------------
// DEFAULT STATE
// --------------------------
alias "toggle_viewmodel" "viewmodel_4"

// Apply default on load
viewmodel_4

// ==================================================
// HUD
// ==================================================

player_nevershow_communityservermessage "1"
cl_hud_color "0"
cl_color "1"
cl_weapon_selection_rarity_color "1"
cl_sanitize_muted_players "0"
cl_sanitize_player_names "0"
cl_hide_avatar_images "0"
cl_teamcounter_playercount_instead_of_avatars "0"
cl_teamid_overhead_colors_show "1"
cl_teamid_overhead_mode "3"
cl_teamid_overhead_fade_near_crosshair "0.7"
cl_teammate_colors_show "1"
cl_scoreboard_survivors_always_on "0"
gameinstructor_enable "0"
cl_autohelp "0"
cl_showloadout "1"
//cl_steamscreenshots "1"
cl_dm_buyrandomweapons "0"
demo_ui_mode "3"


// The percentage of the screen height that is considered safe from overscan.
// Default: 1
//
// <-> Defines the safe zone of the HUD (vertical).
safezoney "0.97"

// The percentage of the screen width that is considered safe from overscan.
// Default: 1
//
// <-> Defines the safe zone of the HUD (horizontal).
safezonex "0.97"

ui_playsettings_mode_official_v20 "premier"
eom_local_player_defeat_anim_enabled "1"


// ==================================================
// CORE BINDS
// ==================================================
// \      = clutch mode toggle
// mouse4 = radar scale toggle
// mouse5 = push-to-talk
// ==================================================

bind "\" "clutch_mode_toggle"
bind "mouse4" "toggleradarscale"
bind "mouse5" "+voicerecord"
bind "n" "noclip"

// ==================================================
// MOVEMENT
// ==================================================
// Mousewheel + space jump binds
// ==================================================

bind "MWHEELUP" "+jump"
bind "MWHEELDOWN" "+jump"
bind "SPACE" "+jump"

// ==================================================
// UTILITY BINDS
// ==================================================
// z = molotov / incendiary
// x = smoke
// c = flashbang
// v = HE grenade
// ==================================================

bind "z" "slot10"
bind "x" "slot8"
bind "c" "slot7"
bind "v" "slot6"

// ==================================================
// SENSITIVITY
// ==================================================

// 0.61 on 800dpi
sensitivity 0.61

// ==================================================
// RADAR
// ==================================================

cl_radar_scale 0.25
cl_hud_radar_scale 1.3
cl_radar_always_centered 1
cl_radar_rotate 1
cl_radar_icon_scale_min 0.65
cl_hud_radar_background_alpha "1"
cl_hud_radar_map_additive "1"

// ==================================================
// AUDIO / VOICE
// ==================================================

// voice_scale 0.6
snd_voipvolume 1.0
cl_mute_all_but_friends_and_party 0

// ==================================================
// PERFORMANCE
// ==================================================

fps_max "500"
fps_max_ui "500"
fps_max_tools "500"

// ==================================================
// VIDEO / DISPLAY
// ==================================================

//r_fullscreen_gamma "2.2"
// 1 = fullscreen
// 0 = windowed
// 2 = borderless windowed

// ==================================================
// NETWORK
// ==================================================

rate "1000000"
cl_net_buffer_ticks "0"
//cl_net_buffer_ticks_use_interp "1"
cl_tickpacket_desired_queuelength "0"

// dmg-predict
cl_predict_body_shot_fx "0"
cl_predict_head_shot_fx "0"
cl_predict_kill_ragdolls "0"

net_client_steamdatagram_enable_override "1"

mm_dedicated_search_maxping "35"
lobby_default_privacy_bits2 "0"
ui_setting_advertiseforhire_auto "0"
//cl_join_advertise "0"
cl_invites_only_friends "0"
cl_invites_only_mainmenu "0"

// ==================================================
// EXTRAS
// ==================================================

r_drawtracers_firstperson 0
tv_listen_voice_indices -1
tv_listen_voice_indices_h -1

// ==================================================
// CONFIG LOAD CONFIRMATION
// ==================================================

// Write all the settings into config.cfg file, the main configuration file of the game.
host_writeconfig

// Play a snowball custom sound when the entire process is done.
play "player/winter/snowball_throw_02.wav"

