// ==================================================
// AUTOEXEC CFG
// ==================================================
// Personal CS2 config
// Loads binds, crosshair toggles, movement, radar,
// voice, sensitivity, and utility binds.
// ==================================================


// ==================================================
// CROSSHAIR COLOR TOGGLE
// ==================================================
// [ = cycle crosshair color
// Cycles: green -> cyan -> black -> repeat
// ==================================================

bind "[" "cycle_xhair_color"

alias "xhair_green" "cl_crosshaircolor 1; alias cycle_xhair_color xhair_cyan"
alias "xhair_cyan"  "cl_crosshaircolor_r 0; cl_crosshaircolor_g 255; cl_crosshaircolor_b 255; cl_crosshaircolor 5; alias cycle_xhair_color xhair_black"
alias "xhair_black" "cl_crosshaircolor_r 0; cl_crosshaircolor_g 0; cl_crosshaircolor_b 0; cl_crosshaircolor 5; alias cycle_xhair_color xhair_green"

alias "cycle_xhair_color" "xhair_green"

// Default crosshair color on load
xhair_black


// ==================================================
// CROSSHAIR TOGGLE (4 MODES)
// primary -> dot -> alt -> extra -> repeat
// ==================================================

bind "]" "toggle_crosshair"

// Shared settings
alias "xhair_shared" "cl_crosshair_outlinethickness 0; cl_crosshairalpha 255; cl_crosshair_dynamic_splitdist 0; cl_crosshair_recoil 0; cl_fixedcrosshairgap 3; cl_crosshair_drawoutline 0; cl_crosshair_dynamic_splitalpha_innermod 0; cl_crosshair_dynamic_splitalpha_outermod 1; cl_crosshair_dynamic_maxdist_splitratio 0.5; cl_crosshairgap_useweaponvalue 0; cl_crosshairusealpha 1; cl_crosshair_t 0; cl_crosshairstyle 4; cl_crosshaircolor 5; cl_crosshaircolor_r 0; cl_crosshaircolor_g 0; cl_crosshaircolor_b 0"

// ==================================================
// PRIMARY - MAIN CROSSHAIR
// ==================================================
alias "crosshair_primary_apply" "cl_crosshairgap -4.4; cl_crosshairthickness 0.7; cl_crosshairdot 0; cl_crosshairsize 1.3"
alias "crosshair_primary" "xhair_shared; crosshair_primary_apply; alias toggle_crosshair crosshair_dot; echo Primary crosshair"

// ==================================================
// DOT
// ==================================================
alias "crosshair_dot_apply" "cl_crosshairgap -5; cl_crosshairthickness 0.5; cl_crosshairdot 1; cl_crosshairsize 0.6"
alias "crosshair_dot" "xhair_shared; crosshair_dot_apply; alias toggle_crosshair crosshair_alt; echo Dot crosshair"

// ==================================================
// ALT
// ==================================================
alias "crosshair_alt_apply" "cl_crosshairgap -2.7; cl_crosshairthickness 0.1; cl_crosshairdot 0; cl_crosshairsize 1.3"
alias "crosshair_alt" "xhair_shared; crosshair_alt_apply; alias toggle_crosshair crosshair_extra; echo Alt crosshair"

// ==================================================
// EXTRA
// ==================================================
alias "crosshair_extra_apply" "cl_crosshairgap -5; cl_crosshairthickness 0.3; cl_crosshairdot 0; cl_crosshairsize 1.7"
alias "crosshair_extra" "xhair_shared; crosshair_extra_apply; alias toggle_crosshair crosshair_primary; echo Extra crosshair"

// ==================================================
// DEFAULT STATE
// ==================================================
alias "toggle_crosshair" "crosshair_dot"

// Load default
crosshair_primary


// ==================================================
// VIEWMODEL TOGGLE
// toggle between view1 and view2
// ==================================================

bind "'" "toggle_viewmodel"

// --------------------------
// VIEWMODEL 1
// --------------------------
alias "viewmodel_1" "viewmodel_fov 68; viewmodel_presetpos 0; viewmodel_offset_x 2.5; viewmodel_offset_y -1.25; viewmodel_offset_z -1.5; alias toggle_viewmodel viewmodel_2; echo Viewmodel 1"

// --------------------------
// VIEWMODEL 2
// --------------------------
alias "viewmodel_2" "viewmodel_fov 68; viewmodel_presetpos 0; viewmodel_offset_x 2.5; viewmodel_offset_y 2; viewmodel_offset_z -1.5; alias toggle_viewmodel viewmodel_1; echo Viewmodel 2"

// --------------------------
// DEFAULT STATE
// --------------------------
alias "toggle_viewmodel" "viewmodel_1"

// Apply default on load
viewmodel_1



// ==================================================
// HUD
// ==================================================

player_nevershow_communityservermessage "1"
cl_hud_color "0"
cl_color "1"
cl_weapon_selection_rarity_color "1"
cl_sanitize_muted_players "0"
cl_sanitize_player_names "0"
cl_hide_avatar_images "0"
cl_teamcounter_playercount_instead_of_avatars "1"
cl_teamid_overhead_colors_show "1"
cl_teamid_overhead_mode "3"
cl_teamid_overhead_fade_near_crosshair "0.7"
cl_teammate_colors_show "1"
cl_scoreboard_survivors_always_on "0"
gameinstructor_enable "0"
cl_autohelp "0"
cl_showloadout "1"
cl_steamscreenshots "1"
cl_dm_buyrandomweapons "0"
demo_ui_mode "3"


// The percentage of the screen height that is considered safe from overscan.
// Default: 1
//
// <-> Defines the safe zone of the HUD (vertical).
safezoney "1"

// The percentage of the screen width that is considered safe from overscan.
// Default: 1
//
// <-> Defines the safe zone of the HUD (horizontal).
safezonex "0.97"

ui_playsettings_mode_official_v20 "premier"
eom_local_player_defeat_anim_enabled "1"


// ==================================================
// CORE BINDS
// ==================================================
// \      = clutch mode toggle
// mouse4 = radar scale toggle
// mouse5 = push-to-talk
// ==================================================

bind "\" "clutch_mode_toggle"
bind "mouse4" "toggleradarscale"
bind "mouse5" "+voicerecord"
bind "n" "noclip"

// ==================================================
// MOVEMENT
// ==================================================
// Mousewheel + space jump binds
// ==================================================

bind "MWHEELUP" "+jump"
bind "MWHEELDOWN" "+jump"
bind "SPACE" "+jump"

// ==================================================
// UTILITY BINDS
// ==================================================
// z = molotov / incendiary
// x = smoke
// c = flashbang
// v = HE grenade
// ==================================================

bind "z" "slot10"
bind "x" "slot8"
bind "c" "slot7"
bind "v" "slot6"


// ==================================================
// SENSITIVITY
// ==================================================

sensitivity 0.665

// ==================================================
// RADAR
// ==================================================

cl_radar_scale 0.25
cl_hud_radar_scale 1.3
cl_radar_always_centered 1
cl_radar_rotate 1
cl_radar_icon_scale_min 0.65
cl_hud_radar_background_alpha "1"
cl_hud_radar_map_additive "1"

// ==================================================
// AUDIO / VOICE
// ==================================================

// voice_scale 0.4
snd_voipvolume 0.9
cl_mute_all_but_friends_and_party 0

// ==================================================
// PERFORMANCE
// ==================================================

fps_max "400"
fps_max_ui "400"
fps_max_tools "400"


// ==================================================
// NETWORK
// ==================================================

rate "1000000"
cl_net_buffer_ticks "0"
cl_net_buffer_ticks_use_interp "1"
cl_tickpacket_desired_queuelength "0"

// dmg-predict
cl_predict_body_shot_fx "0"
cl_predict_head_shot_fx "0"
cl_predict_kill_ragdolls "0"

// Makes the client to select a relay and communicate through that relay.
// Default: 0
//
// <> Values:
//  0: Use the connect method requested by GC.
// >0: Always use SDR if possible.
// <0: Always use direct UDP if possible
net_client_steamdatagram_enable_override "1"

mm_dedicated_search_maxping "40"

lobby_default_privacy_bits2 "0"
ui_setting_advertiseforhire_auto "0"
cl_join_advertise "0"
cl_invites_only_friends "0"
cl_invites_only_mainmenu "0"

// ==================================================
// EXTRAS
// ==================================================

r_drawtracers_firstperson 1
tv_listen_voice_indices -1
tv_listen_voice_indices_h -1

