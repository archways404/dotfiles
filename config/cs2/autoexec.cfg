// ==================================================
// AUTOEXEC CFG
// ==================================================
// Personal CS2 config
// Loads binds, crosshair toggles, movement, radar,
// voice, sensitivity, and utility binds.
// ==================================================


// ==================================================
// CROSSHAIR COLOR TOGGLE
// ==================================================
// [ = cycle crosshair color
// Cycles: green -> cyan -> black -> repeat
// ==================================================

bind "[" "cycle_xhair_color"

alias "xhair_green" "cl_crosshaircolor 1; alias cycle_xhair_color xhair_cyan"
alias "xhair_cyan"  "cl_crosshaircolor_r 0; cl_crosshaircolor_g 255; cl_crosshaircolor_b 255; cl_crosshaircolor 5; alias cycle_xhair_color xhair_black"
alias "xhair_black" "cl_crosshaircolor_r 0; cl_crosshaircolor_g 0; cl_crosshaircolor_b 0; cl_crosshaircolor 5; alias cycle_xhair_color xhair_green"

alias "cycle_xhair_color" "xhair_green"

// Default crosshair color on load
xhair_black


// ==================================================
// CROSSHAIR TOGGLE (4 MODES)
// primary -> dot -> alt -> extra -> repeat
// ==================================================

bind "]" "toggle_crosshair"

// Shared settings
alias "xhair_shared" "cl_crosshair_outlinethickness 0; cl_crosshairalpha 255; cl_crosshair_dynamic_splitdist 0; cl_crosshair_recoil 0; cl_fixedcrosshairgap 3; cl_crosshair_drawoutline 0; cl_crosshair_dynamic_splitalpha_innermod 0; cl_crosshair_dynamic_splitalpha_outermod 1; cl_crosshair_dynamic_maxdist_splitratio 0.5; cl_crosshairgap_useweaponvalue 0; cl_crosshairusealpha 1; cl_crosshair_t 0; cl_crosshairstyle 4"

// ==================================================
// PRIMARY
// ==================================================
alias "crosshair_primary_apply" "cl_crosshairgap -2.9; cl_crosshairthickness 0.6; cl_crosshairdot 0; cl_crosshairsize 1.7"
alias "crosshair_primary" "xhair_shared; crosshair_primary_apply; alias toggle_crosshair crosshair_dot; echo Primary crosshair"

// ==================================================
// DOT
// ==================================================
alias "crosshair_dot_apply" "cl_crosshairgap -5; cl_crosshairthickness 0.5; cl_crosshairdot 1; cl_crosshairsize 0.6"
alias "crosshair_dot" "xhair_shared; crosshair_dot_apply; alias toggle_crosshair crosshair_alt; echo Dot crosshair"

// ==================================================
// ALT
// ==================================================
alias "crosshair_alt_apply" "cl_crosshairgap -2.7; cl_crosshairthickness 0.1; cl_crosshairdot 0; cl_crosshairsize 1.3; cl_crosshaircolor_r 0; cl_crosshaircolor_g 0; cl_crosshaircolor_b 0; cl_crosshaircolor 5"
alias "crosshair_alt" "xhair_shared; crosshair_alt_apply; alias toggle_crosshair crosshair_extra; echo Alt crosshair"

// ==================================================
// EXTRA
// ==================================================
alias "crosshair_extra_apply" "cl_crosshairgap -1.7; cl_crosshairthickness 0.6; cl_crosshairdot 0; cl_crosshairsize 2.3; cl_crosshaircolor_r 0; cl_crosshaircolor_g 0; cl_crosshaircolor_b 0; cl_crosshaircolor 5"
alias "crosshair_extra" "xhair_shared; crosshair_extra_apply; alias toggle_crosshair crosshair_primary; echo Extra crosshair"

// ==================================================
// DEFAULT STATE
// ==================================================
alias "toggle_crosshair" "crosshair_primary"

// Load default
crosshair_primary


// ==================================================
// VIEWMODEL TOGGLE
// ' = toggle between view1 and view2
// ==================================================

bind "'" "toggle_viewmodel

// --------------------------
// VIEWMODEL 1
// --------------------------
alias "viewmodel_1" "viewmodel_fov 68; viewmodel_presetpos 0; viewmodel_offset_x 2.5; viewmodel_offset_y -1; viewmodel_offset_z -1.75; alias toggle_viewmodel viewmodel_2; echo Viewmodel 1"

// --------------------------
// VIEWMODEL 2
// --------------------------
alias "viewmodel_2" "viewmodel_fov 68; viewmodel_presetpos 0; viewmodel_offset_x 2.5; viewmodel_offset_y 2; viewmodel_offset_z -2; alias toggle_viewmodel viewmodel_1; echo Viewmodel 2"

// --------------------------
// DEFAULT STATE
// --------------------------
alias "toggle_viewmodel" "viewmodel_1"

// Apply default on load
viewmodel_1


// ==================================================
// CORE BINDS
// ==================================================
// \      = clutch mode toggle
// mouse4 = radar scale toggle
// mouse5 = push-to-talk
// ==================================================

bind "\" "clutch_mode_toggle"
bind "mouse4" "toggleradarscale"
bind "mouse5" "+voicerecord"
bind "n" "noclip"

// ==================================================
// MOVEMENT
// ==================================================
// Mousewheel + space jump binds
// ==================================================

bind "MWHEELUP" "+jump"
bind "MWHEELDOWN" "+jump"
bind "SPACE" "+jump"


// ==================================================
// JUMPTHROW
// ==================================================
// m = jumpthrow
// ==================================================

alias "+jt" "+jump; -attack; -attack2"
alias "-jt" "-jump"
bind "m" "+jt"


// ==================================================
// UTILITY BINDS
// ==================================================
// z = molotov / incendiary
// x = smoke
// c = flashbang
// v = HE grenade
// ==================================================

bind "z" "slot10"
bind "x" "slot8"
bind "c" "slot7"
bind "v" "slot6"


// ==================================================
// SENSITIVITY
// ==================================================

sensitivity 0.665


// ==================================================
// RADAR
// ==================================================

cl_radar_scale 0.25
cl_hud_radar_scale 1.3
cl_radar_always_centered 1
cl_radar_rotate 1
cl_radar_icon_scale_min 0.65


// ==================================================
// AUDIO / VOICE
// ==================================================

// voice_scale 0.4
snd_voipvolume 0.9
cl_mute_all_but_friends_and_party 0

// ==================================================
// PERFORMANCE
// ==================================================

fps_max 999
rate 1000000


