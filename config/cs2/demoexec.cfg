// ==================================================
// DEMO RECORDING CONFIG
// archways404
// ==================================================

// FPS
fps_max 0
fps_max_ui 500
fps_max_tools 500

// Resolution handled by launch options/HLAE

// --------------------------------------------------
// CROSSHAIR
// --------------------------------------------------

cl_crosshaircolor 5
cl_crosshaircolor_r 0
cl_crosshaircolor_g 255
cl_crosshaircolor_b 255

cl_crosshair_drawoutline 0
cl_crosshair_outlinethickness 0
cl_crosshairdot 0
cl_crosshairgap -2.8
cl_crosshairsize 1.3
cl_crosshairthickness 0.4

// --------------------------------------------------
// VIEWMODEL
// --------------------------------------------------

viewmodel_fov 68
viewmodel_presetpos 0
viewmodel_offset_x 2.5
viewmodel_offset_y -1
viewmodel_offset_z -1.7

// --------------------------------------------------
// DEMO VISUALS
// --------------------------------------------------

cl_draw_only_deathnotices 1
spec_show_xray 0

r_drawtracers_firstperson 0

// --------------------------------------------------
// HUD
// --------------------------------------------------

safezonex 1
safezoney 1

// --------------------------------------------------
// VOICE
// --------------------------------------------------

tv_listen_voice_indices 0
tv_listen_voice_indices_h 0

// --------------------------------------------------
// QUALITY
// --------------------------------------------------

mat_queue_mode -1

mat_setvideomode 1920 1440 1

echo "=== DEMO RECORDING CONFIG LOADED ==="
