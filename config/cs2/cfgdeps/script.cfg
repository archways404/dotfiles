// ==================================================
// SCRIPTS / VIEWMODEL / EXTRAS
// ==================================================

alias "viewmodel_main" "viewmodel_fov 68; viewmodel_presetpos 0; viewmodel_offset_x 2.5; viewmodel_offset_y 0.66; viewmodel_offset_z -1.77; alias toggle_viewmodel viewmodel_compact; echo Viewmodel: MAIN"

alias "viewmodel_compact" "viewmodel_fov 68; viewmodel_presetpos 0; viewmodel_offset_x 2.5; viewmodel_offset_y -0.8; viewmodel_offset_z -1.1; alias toggle_viewmodel viewmodel_classic; echo Viewmodel: COMPACT"

alias "viewmodel_classic" "viewmodel_fov 68; viewmodel_presetpos 0; viewmodel_offset_x 2.5; viewmodel_offset_y 1.0; viewmodel_offset_z -1.1; alias toggle_viewmodel viewmodel_main; echo Viewmodel: CLASSIC"

alias "toggle_viewmodel" "viewmodel_compact"

// Default
viewmodel_main
