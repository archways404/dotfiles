// ==================================================
// CROSSHAIR
// ==================================================

// [ = black -> cyan -> green
bind "[" "cycle_xhair_color"

alias "xhair_cyan"  "cl_crosshaircolor 5; cl_crosshaircolor_r 0; cl_crosshaircolor_g 255; cl_crosshaircolor_b 255; alias cycle_xhair_color xhair_green"
alias "xhair_green" "cl_crosshaircolor 5; cl_crosshaircolor_r 0; cl_crosshaircolor_g 255; cl_crosshaircolor_b 0; alias cycle_xhair_color xhair_black"
alias "xhair_black" "cl_crosshaircolor 5; cl_crosshaircolor_r 0; cl_crosshaircolor_g 0; cl_crosshaircolor_b 0; alias cycle_xhair_color xhair_cyan"

alias "cycle_xhair_color" "xhair_cyan"
xhair_black

// ] = crosshair toggle
bind "]" "toggle_crosshair"

alias "xhair_shared" "cl_crosshairalpha 255; cl_crosshairusealpha 1; cl_crosshairstyle 4; cl_crosshair_t 0; cl_crosshair_recoil 0; cl_fixedcrosshairgap 3; cl_crosshairgap_useweaponvalue 0; cl_crosshair_dynamic_splitdist 0; cl_crosshair_dynamic_splitalpha_innermod 0; cl_crosshair_dynamic_splitalpha_outermod 1; cl_crosshair_dynamic_maxdist_splitratio 0.5"

alias "crosshair_primary" "xhair_shared; cl_crosshair_drawoutline 0; cl_crosshair_outlinethickness 0; cl_crosshairdot 0; cl_crosshairgap -2.8; cl_crosshairsize 1.3; cl_crosshairthickness 0.4; alias toggle_crosshair crosshair_dot; echo Crosshair: Primary"

alias "crosshair_dot" "xhair_shared; cl_crosshair_drawoutline 0; cl_crosshair_outlinethickness 0; cl_crosshairdot 1; cl_crosshairgap -4.9; cl_crosshairsize 0.4; cl_crosshairthickness 0.8; alias toggle_crosshair crosshair_alt; echo Crosshair: Dot"

alias "crosshair_alt"     "xhair_shared; cl_crosshair_drawoutline 1; cl_crosshair_outlinethickness 0; cl_crosshairdot 0; cl_crosshairgap -2.9; cl_crosshairsize 1.8; cl_crosshairthickness 0.8; alias toggle_crosshair crosshair_alt2; echo Crosshair: Old Primary"

alias "crosshair_alt2"    "xhair_shared; cl_crosshair_drawoutline 0; cl_crosshair_outlinethickness 0; cl_crosshairdot 0; cl_crosshairgap -3.2; cl_crosshairsize 1.3; cl_crosshairthickness 0.6; alias toggle_crosshair crosshair_extra; echo Crosshair: Alt 2"

alias "crosshair_extra"   "xhair_shared; cl_crosshair_drawoutline 0; cl_crosshair_outlinethickness 0; cl_crosshairdot 0; cl_crosshairgap -5; cl_crosshairsize 1.7; cl_crosshairthickness 0.3; alias toggle_crosshair crosshair_primary; echo Crosshair: Extra"

alias "toggle_crosshair" "crosshair_alt"
crosshair_dot
