// ==================================================
// AUDIO / VOICE
// ==================================================

volume "0.22"

snd_menumusic_volume "0"
snd_roundstart_volume "0"
snd_roundaction_volume "0"
snd_roundend_volume "0"
snd_mvp_volume "0"
snd_deathcamera_volume "0"

snd_mapobjective_volume "0.009940"
snd_tensecondwarning_volume "0.009940"

snd_voipvolume "0.72"
snd_mute_mvp_music_live_players "1"

snd_headphone_eq "1"
snd_spatialize_lerp "0.8"
snd_steamaudio_enable_perspective_correction "1"
snd_toolvolume "0"

cl_mute_all_but_friends_and_party "0"

// DM audio toggle
alias "audio_normal" "volume 0.22; alias toggle_dm_audio audio_dm; echo Audio: NORMAL"
alias "audio_dm"     "volume 0.01; alias toggle_dm_audio audio_normal; echo Audio: DM"
alias "toggle_dm_audio" "audio_dm"

// GOTV / demo extras
tv_listen_voice_indices "-1"
tv_listen_voice_indices_h "-1"
