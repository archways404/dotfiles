bind "\" "clutch_mode_toggle"
bind "mouse4" "toggleradarscale"
bind "mouse5" "+voicerecord"
bind "n" "noclip"
bind "F11" "disconnect"

// Movement
bind "MWHEELUP" "+jump"
bind "MWHEELDOWN" "+jump"
bind "SPACE" "+jump"

// Utility
bind "z" "slot10" // Molotov / Incendiary
bind "x" "slot8"  // Smoke
bind "c" "slot7"  // Flash
bind "v" "slot6"  // HE

bind "j" "sv_rethrow_last_grenade"

// Toggles
bind "F10" "toggle_dm_audio"
bind "'" "toggle_viewmodel"
